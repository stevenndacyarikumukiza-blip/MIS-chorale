<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chorale MIS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            margin:0;
            background:#f4f6f9;
        }

        .sidebar{
            position:fixed;
            left:0;
            top:0;
            width:260px;
            height:100vh;
            background:#111827;
            overflow-y:auto;
        }

        .logo{
            color:white;
            text-align:center;
            padding:20px;
            font-size:30px;
            font-weight:bold;
            border-bottom:1px solid #374151;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 20px;
            transition:.3s;
            font-size:16px;
        }

        .sidebar a:hover{
            background:#2563eb;
            padding-left:30px;
        }

        .content{
            margin-left:260px;
            padding:20px;
        }

        .topbar{
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,.1);
            margin-bottom:20px;
        }

    </style>

</head>
<body>

<div class="sidebar">

    <div class="logo">
        🎵 Chorale MIS
    </div>

    <a href="/">🏠 Ahabanza</a>

    <a href="/abanyamuryango">
        🧑‍🤝‍🧑 Abanyamuryango
    </a>

    <a href="/add_member">
        ➕ Ongeraho Umunyamuryango
    </a>

    <a href="/imisanzu">
        💰 Imisanzu
    </a>

    <a href="/add_contribution">
        ➕ Andika Umusanzu
    </a>

    <a href="/attendance">
        📅 Uko Bitabira
    </a>

    <a href="/add_attendance">
        ✅ Kwandika Ubitabiriye
    </a>

</div>

<div class="content">

    <div class="topbar">
        <h4>Chorale Inshuti za Yesu MIS</h4>
    </div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
